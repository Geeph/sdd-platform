# Java platform reusable workflow (M4, §1).
#
# Called by ci-gate.yml for each backend component. Checks out the product
# repo at the head SHA and runs the Java/Gradle command contract from M3.
#
# Tool versions locked to M3 §0 D1: Java 21 LTS, Gradle via wrapper.

on:
  workflow_call:
    inputs:
      product_repo:
        description: 'Product repository (owner/name)'
        type: string
        required: true
      head_sha:
        description: 'PR head commit SHA'
        type: string
        required: true
      paths:
        description: 'JSON array of component paths to build'
        type: string
        required: true

jobs:
  build:
    strategy:
      matrix:
        path: ${{ fromJSON(inputs.paths) }}
      fail-fast: false
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.path }}
    steps:
      - name: checkout product repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.product_repo }}
          ref: ${{ inputs.head_sha }}
          # D24: default GITHUB_TOKEN (前提: 隔离环境 spike 验证通过)
          # 若验证失败, 此处需换成 App installation token + D24 列出的配套改动

      - name: setup java (D23)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'   # M3 §0 D1: Java 21 LTS

      - name: cache gradle wrapper
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles(format('{0}/gradle/wrapper/gradle-wrapper.properties', matrix.path)) }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: lint (spotlessCheck)
        run: ./gradlew spotlessCheck

      - name: typecheck (compileJava + compileTestJava)
        run: ./gradlew compileJava compileTestJava

      - name: test
        run: ./gradlew test

      - name: build
        run: ./gradlew build
