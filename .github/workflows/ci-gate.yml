# CI Gate — required workflow for product repositories (§3.4, M4).
#
# This workflow is hosted in the platform repo and enforced via the dedicated
# organization ruleset (sdd-workflows-<repository-id>). Product repositories
# do NOT contain a copy.
#
# M4: detect job runs real platform detection (path rules + sdd impact +
# labels + existing AND gate), then four platform caller jobs dispatch the
# reusable workflows, and CI Gate aggregates with the full truth table.
#
# Job name frozen at "CI Gate" (D8) — required status check context matches
# this name.
#
# Minimal permissions (D10): contents:read, pull-requests:read.
# detect does NOT checkout/execute product PR blob. Platform jobs DO checkout
# product PR blob (D2: they are the things being tested, not the judges).

name: ci-gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]   # §2.8

permissions:
  contents: read
  pull-requests: read

jobs:
  detect:
    name: detect
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      web: ${{ steps.detect.outputs.web }}
      ios: ${{ steps.detect.outputs.ios }}
      android: ${{ steps.detect.outputs.android }}
      contract_changed: ${{ steps.detect.outputs.contract_changed }}
      backend_paths: ${{ steps.detect.outputs.backend_paths }}
      web_paths: ${{ steps.detect.outputs.web_paths }}
      ios_paths: ${{ steps.detect.outputs.ios_paths }}
      android_paths: ${{ steps.detect.outputs.android_paths }}
      product_repo: ${{ steps.detect.outputs.product_repo }}
      head_sha: ${{ steps.detect.outputs.head_sha }}
    steps:
      # Resolve trusted workflow source — same pattern as pr-hygiene.yml.
      - name: resolve trusted workflow source
        id: workflow-source
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          SOURCE_REPO="${WORKFLOW_REF%%/.github/workflows/*}"
          if ! [[ "$SOURCE_REPO" =~ ^[^/]+/[^/]+$ ]]; then
            echo "Invalid GITHUB_WORKFLOW_REF: $WORKFLOW_REF" >&2
            exit 1
          fi
          echo "repository=$SOURCE_REPO" >> "$GITHUB_OUTPUT"

      # Checkout the PLATFORM repo at the workflow's own SHA (the pinned
      # commit from the organization ruleset). NOT the product PR.
      - name: checkout platform repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.workflow-source.outputs.repository }}
          ref: ${{ github.workflow_sha }}
          path: platform

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: install dependencies
        working-directory: platform
        run: pnpm install --frozen-lockfile

      - name: build sdd CLI
        working-directory: platform
        run: pnpm -r build

      # D11 fix: step has id:detect, outputs are wired via steps.detect.outputs.*
      - name: detect platforms
        id: detect
        working-directory: platform
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.event.pull_request.base.repo.full_name }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          node cli/bin/run.js gate detect --repo "$REPO" --pr "$PR_NUMBER" > /tmp/detect.json
          cat /tmp/detect.json

          {
            echo "product_repo=$REPO"
            echo "head_sha=$HEAD_SHA"
            echo "backend=$(jq -r '.backend' /tmp/detect.json)"
            echo "web=$(jq -r '.web' /tmp/detect.json)"
            echo "ios=$(jq -r '.ios' /tmp/detect.json)"
            echo "android=$(jq -r '.android' /tmp/detect.json)"
            echo "contract_changed=$(jq -r '.contract_changed' /tmp/detect.json)"
            echo "backend_paths=$(jq -c '.backend_paths' /tmp/detect.json)"
            echo "web_paths=$(jq -c '.web_paths' /tmp/detect.json)"
            echo "ios_paths=$(jq -c '.ios_paths' /tmp/detect.json)"
            echo "android_paths=$(jq -c '.android_paths' /tmp/detect.json)"
          } >> "$GITHUB_OUTPUT"

  # ---- Platform caller jobs (§1.1) ----

  backend:
    needs: [detect]
    if: needs.detect.outputs.backend == 'true'
    uses: ./.github/workflows/java.yml
    with:
      product_repo: ${{ needs.detect.outputs.product_repo }}
      head_sha: ${{ needs.detect.outputs.head_sha }}
      paths: ${{ needs.detect.outputs.backend_paths }}

  web:
    needs: [detect]
    if: needs.detect.outputs.web == 'true'
    uses: ./.github/workflows/web.yml
    with:
      product_repo: ${{ needs.detect.outputs.product_repo }}
      head_sha: ${{ needs.detect.outputs.head_sha }}
      paths: ${{ needs.detect.outputs.web_paths }}

  ios:
    needs: [detect]
    if: needs.detect.outputs.ios == 'true'   # D14: 外层 if, 未检测到时不分配 macOS runner
    uses: ./.github/workflows/ios.yml
    with:
      product_repo: ${{ needs.detect.outputs.product_repo }}
      head_sha: ${{ needs.detect.outputs.head_sha }}
      paths: ${{ needs.detect.outputs.ios_paths }}

  android:
    needs: [detect]
    if: needs.detect.outputs.android == 'true'
    uses: ./.github/workflows/android.yml
    with:
      product_repo: ${{ needs.detect.outputs.product_repo }}
      head_sha: ${{ needs.detect.outputs.head_sha }}
      paths: ${{ needs.detect.outputs.android_paths }}

  # ---- CI Gate aggregation (§3, D12/D13) ----

  CI Gate:
    name: CI Gate
    needs: [detect, backend, web, ios, android]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: aggregate
        run: |
          # 第一步 (D13): detect 自身必须成功 — 必须在所有平台判断之前。
          if [ "${{ needs.detect.result }}" != "success" ]; then
            echo "::error::detect job did not succeed (result: ${{ needs.detect.result }})"
            exit 1
          fi

          # 第二步 (D12): 对四个平台 job 应用化简真值表:
          #   规则 1: result=failure/cancelled → 无条件失败
          #   规则 2: detected=true 且 result=skipped → 失败
          FAILED=0

          # backend
          if [ "${{ needs.backend.result }}" = "failure" ] || [ "${{ needs.backend.result }}" = "cancelled" ]; then
            echo "::error::backend job failed or cancelled"
            FAILED=1
          elif [ "${{ needs.detect.outputs.backend }}" = "true" ] && [ "${{ needs.backend.result }}" = "skipped" ]; then
            echo "::error::backend was detected but skipped"
            FAILED=1
          fi

          # web
          if [ "${{ needs.web.result }}" = "failure" ] || [ "${{ needs.web.result }}" = "cancelled" ]; then
            echo "::error::web job failed or cancelled"
            FAILED=1
          elif [ "${{ needs.detect.outputs.web }}" = "true" ] && [ "${{ needs.web.result }}" = "skipped" ]; then
            echo "::error::web was detected but skipped"
            FAILED=1
          fi

          # ios
          if [ "${{ needs.ios.result }}" = "failure" ] || [ "${{ needs.ios.result }}" = "cancelled" ]; then
            echo "::error::ios job failed or cancelled"
            FAILED=1
          elif [ "${{ needs.detect.outputs.ios }}" = "true" ] && [ "${{ needs.ios.result }}" = "skipped" ]; then
            echo "::error::ios was detected but skipped"
            FAILED=1
          fi

          # android
          if [ "${{ needs.android.result }}" = "failure" ] || [ "${{ needs.android.result }}" = "cancelled" ]; then
            echo "::error::android job failed or cancelled"
            FAILED=1
          elif [ "${{ needs.detect.outputs.android }}" = "true" ] && [ "${{ needs.android.result }}" = "skipped" ]; then
            echo "::error::android was detected but skipped"
            FAILED=1
          fi

          if [ "$FAILED" = "1" ]; then
            echo "::error::CI Gate failed"
            exit 1
          fi
          echo "CI Gate passed"
