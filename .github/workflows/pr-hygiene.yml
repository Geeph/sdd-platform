# PR hygiene — required workflow for product repositories (§3.4).
#
# This workflow is hosted in the platform repo and enforced via the dedicated
# organization ruleset (sdd-workflows-<repository-id>). Product repositories
# do NOT contain a copy.
#
# Job name frozen at "PR hygiene" (D8) — required status check context matches
# this name.
#
# Minimal permissions (D10): contents:read, pull-requests:read.
# No secrets, no checkout/execute of product PR blob.
# Checks out the PLATFORM repo at pinned SHA to get the sdd CLI, then runs
# `sdd gate hygiene` which reads the product PR via API (not filesystem).
#
# Pinned platform identity (§3.6 / D10): SDD_PLATFORM_REPO and
# SDD_PLATFORM_REF below MUST be kept in lock-step with the dedicated
# organization ruleset's workflow source (repository_id + path + sha). The
# workflow runs with on:pull_request (not pull_request_target), so
# github.sha / github.event.pull_request.head.repo.* are NOT the platform
# identity — they describe the product PR. Never use them to locate the sdd
# CLI or the platform source.

name: pr-hygiene

on:
  pull_request:
    branches: [main]

# Platform identity — derived from the workflow's own identity.
# For organization required workflows, `github.workflow_sha` is the pinned
# commit from the ruleset, and `github.workflow_ref` contains the source
# repository. This closes the pin loop: the workflow runs from exactly the
# commit that the ruleset pinned, not from a movable branch like `main`.
#
# SDD_PLATFORM_REPO is still needed because actions/checkout requires an
# explicit repository. It MUST match the source repo configured in the
# organization ruleset; if they drift, the workflow will fail or produce
# incorrect results.
env:
  SDD_PLATFORM_REPO: Geeph/sdd-platform   # MUST match org ruleset source repo

permissions:
  contents: read
  pull-requests: read

jobs:
  PR hygiene:
    name: PR hygiene
    runs-on: ubuntu-latest
    steps:
      # Checkout the PLATFORM repo at the workflow's own SHA (the pinned
      # commit from the organization ruleset). This is NOT the product PR —
      # we use github.workflow_sha so fork PRs cannot redirect the checkout
      # (§3.6 / D10), and so the workflow version is always tied to the
      # ruleset pin.
      - name: checkout platform repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SDD_PLATFORM_REPO }}
          ref: ${{ github.workflow_sha }}
          path: platform

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: install dependencies
        working-directory: platform
        run: pnpm install --frozen-lockfile

      - name: build sdd CLI
        working-directory: platform
        run: pnpm -r build

      - name: run gate hygiene
        working-directory: platform
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The product repo is the base repo of the PR — never the head repo,
          # which for fork PRs belongs to the fork (untrusted).
          REPO="${{ github.event.pull_request.base.repo.full_name }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # Run hygiene check — reads PR via API, does NOT checkout product blob.
          node cli/bin/run.js gate hygiene \
            --repo "$REPO" \
            --pr "$PR_NUMBER"
